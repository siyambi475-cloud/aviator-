<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aviator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #121214;
        }

        .main-webview {
            flex: 1;
            border: none;
            width: 100%;
            height: 100vh;
        }

        .top-webview-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 250px;
            height: 150px;
            z-index: 10;
            overflow: hidden;
            border: 2px solid #e21b3c;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #1a1a1f;
            border-radius: 6px;
        }

        .top-webview {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <!-- গিটহাব এবং ব্রাউজারে আইফ্রেম সিকিউরিটি বাইপাস করার স্ক্রিপ্টসমূহ -->
    <script src="https://unpkg.com/@unpkg/custom-elements@1.1.0/src/custom-elements.js"></script>
    <script src="https://unpkg.com/@niutech/x-frame-bypass@1.0.2/x-frame-bypass.js" type="module"></script>
</head>
<body>

    <!-- ছোট ওয়েব ভিউ (উপরের বাম কর্নারে থাকবে) -->
    <!-- আপনি নিচে src=" " এর ভেতর আপনার কাঙ্ক্ষিত লিঙ্কটি বসাবেন -->
    <div class="top-webview-container">
        <iframe is="x-frame-bypass" class="top-webview" src="https://www.google.com"></iframe>
    </div>

    <!-- বড় ওয়েব ভিউ (নিচে ব্যাকগ্রাউন্ডে ফুল স্ক্রিন থাকবে) -->
    <!-- আপনি নিচে src=" " এর ভেতর আপনার কাঙ্ক্ষিত লিঙ্কটি বসাবেন -->
    <iframe is="x-frame-bypass" class="main-webview" src="https://jaya9bangladesh.com"></iframe>

</body>
</html>
