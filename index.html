<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Server Bypass Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Background Matrix/Terminal Effect */
        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            font-size: 14px;
            overflow: hidden;
            white-space: pre-wrap;
            pointer-events: none;
        }

        /* Main Dashboard Container */
        .dashboard {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #e21b3c;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(226, 27, 60, 0.4), inset 0 0 20px rgba(226, 27, 60, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Glitch Headline */
        .glitch-title {
            text-align: center;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px #e21b3c, -2px -2px #00ff00;
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #e21b3c, -2px -2px #00ff00; transform: translate(0); }
            20% { text-shadow: -2px 2px #e21b3c, 2px -2px #00ff00; transform: translate(-2px, 2px); }
            40% { text-shadow: 2px -2px #e21b3c, -2px 2px #00ff00; transform: translate(2px, -2px); }
            60% { text-shadow: -2px -2px #e21b3c, 2px 2px #00ff00; transform: translate(-2px, -2px); }
            80% { text-shadow: 2px 2px #e21b3c, -2px -2px #00ff00; transform: translate(2px, 2px); }
            100% { text-shadow: 2px 2px #e21b3c, -2px -2px #00ff00; transform: translate(0); }
        }

        /* Terminal Console Screen (Expanded for full hacker experience) */
        .console {
            background: #000;
            border: 1px solid #333;
            height: 280px;
            overflow-y: auto;
            padding: 15px;
            font-size: 13px;
            color: #00ff00;
            border-radius: 6px;
            box-shadow: inset 0 0 15px #00ff0022;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <!-- Background Fake Code Matrix -->
    <div id="matrix-bg"></div>

    <!-- Main Hack Dashboard -->
    <div class="dashboard">
        <div class="glitch-title">V.I.P INJECTOR v2.4</div>
        
        <!-- Terminal Logs Screen -->
        <div class="console" id="console-logs">
            <div>[root@hack_server ~]# Initiating connection...</div>
        </div>
    </div>

    <script>
        // --- 1. Background Matrix Code Effect ---
        const matrixBg = document.getElementById('matrix-bg');
        let fakeCode = "";
        const codeSnippets = [
            "01001000 01100001 01100011 01101011",
            "function bypassSecurity() { return true; }",
            "injecting payload into target_server...",
            "decrypting hash: 8f4e2...a1b",
            "CONNECTION ESTABLISHED - PORT 443",
            "null pointer exception bypassed",
            "fetching live seed packet...",
            "bypassing anti-cheat firewall...",
            "status: anonymous proxy active"
        ];

        setInterval(() => {
            const randomSnippet = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
            fakeCode += randomSnippet + "\n";
            if (fakeCode.length > 2000) fakeCode = fakeCode.slice(-2000); 
            matrixBg.innerText = fakeCode;
        }, 150);


        // --- 2. Fake Terminal Console Logs ---
        const consoleLogs = document.getElementById('console-logs');
        const hackerMessages = [
            "Analyzing server algorithms...",
            "Bypassing RSA-2048 encryption...",
            "Accessing WebSocket stream...",
            "Capturing live hash rate...",
            "Connection routing via Proxy-v6...",
            "[SUCCESS] Script injected anonymously.",
            "Syncing database packets...",
            "Overriding cloudflare security...",
            "Bypassing token validations...",
            "Server mainframe linked successfully."
        ];
        
        let msgIndex = 0;
        setInterval(() => {
            if (msgIndex < hackerMessages.length) {
                const newLog = document.createElement('div');
                newLog.innerText = `> ${hackerMessages[msgIndex]}`;
                consoleLogs.appendChild(newLog);
                consoleLogs.scrollTop = consoleLogs.scrollHeight; // Auto scroll down
                msgIndex++;
            } else {
                msgIndex = 0; // Loop messages smoothly
                consoleLogs.innerHTML = "<div>[root@hack_server ~]# Re-syncing terminal stream...</div>";
            }
        }, 2000);

    </script>
</body>
</html>
