<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Web View Dashboard</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: #121214;}
        .main-webview { flex: 1; border: none; width: 100%; height: 100vh; }
        .top-webview-container { position: absolute; top: 20px; left: 20px; width: 250px; height: 150px; z-index: 10; background: #e21b3c; padding: 2px; border-radius: 4px;}
        .top-webview { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <!-- ছোট স্ক্রিনে আপনার তৈরি করা এভিয়েটর সিগন্যাল পেজ দেখাবে -->
    <div class="top-webview-container">
        <iframe class="top-webview" src="aviator.html"></iframe>
    </div>

    <!-- বড় স্ক্রিনে আপনার কাঙ্ক্ষিত লিংকটি বসিয়ে দিন -->
    <!-- (গিটহাবে বেটিং সাইটগুলো সরাসরি আইফ্রেমে সাপোর্ট করে না, তাই অন্য কোনো লিংক বা ডেমো পেজ ব্যবহার করতে পারেন) -->
    <iframe class="main-webview" src="https://www.bing.com"></iframe>

</body>
</html>
